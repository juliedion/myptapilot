<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="24" height="24" rx="6" fill="url(#bg)"/>
  <!-- lines from center to satellite circles -->
  <line x1="12" y1="12" x2="12" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="18.062" y2="15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="5.938" y2="15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- center circle -->
  <circle cx="12" cy="12" r="4" fill="white"/>
  <!-- satellite circles at 120° intervals, radius 7 -->
  <circle cx="12" cy="5" r="2.5" fill="white"/>
  <circle cx="18.062" cy="15.5" r="2.5" fill="white"/>
  <circle cx="5.938" cy="15.5" r="2.5" fill="white"/>
</svg>
